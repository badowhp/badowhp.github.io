<script>
document.addEventListener('DOMContentLoaded', function() {
    console.log('Language persistent menu initializing...');
    
    function updateAllMenuLinks() {
        const currentPath = window.location.pathname;
        const isGermanPage = currentPath.startsWith('/de/');
        
        console.log('Current path:', currentPath, 'Is German:', isGermanPage);
        
        // Update all navigation links to maintain language context
        const navLinks = document.querySelectorAll('nav a:not([data-lang])');
        
        navLinks.forEach(function(link) {
            const href = link.getAttribute('href');
            if (!href || href.startsWith('#') || href.startsWith('mailto:') || href.startsWith('http')) {
                return; // Skip non-navigation links
            }
            
            console.log('Processing link:', href);
            
            if (isGermanPage) {
                // On German pages, ensure all menu links point to German versions
                if (!href.startsWith('/de/')) {
                    if (href === '/') {
                        link.href = '/de/';
                    } else {
                        link.href = '/de' + href;
                    }
                    console.log('Updated to German:', link.href);
                }
            } else {
                // On English pages, ensure all menu links point to English versions
                if (href.startsWith('/de/')) {
                    if (href === '/de/') {
                        link.href = '/';
                    } else {
                        link.href = href.substring(3);
                    }
                    console.log('Updated to English:', link.href);
                }
            }
        });
        
        // Update language switcher
        const langSwitchers = document.querySelectorAll('a[data-lang]');
        langSwitchers.forEach(function(link) {
            const targetLang = link.getAttribute('data-lang');
            
            if (targetLang === 'de') {
                if (isGermanPage) {
                    // Already on German page, no change needed
                    return;
                } else {
                    // On English page, switch to German equivalent
                    if (currentPath === '/') {
                        link.href = '/de/';
                    } else {
                        link.href = '/de' + currentPath;
                    }
                }
            } else if (targetLang === 'en') {
                if (isGermanPage) {
                    // On German page, switch to English equivalent
                    if (currentPath === '/de/') {
                        link.href = '/';
                    } else {
                        link.href = currentPath.substring(3) || '/';
                    }
                } else {
                    // Already on English page, no change needed
                    return;
                }
            }
        });
    }
    
    // Update menu links on page load
    updateAllMenuLinks();
    
    // Also update after a short delay to catch dynamically loaded content
    setTimeout(updateAllMenuLinks, 500);
    
    // Add click handlers for language switchers
    document.addEventListener('click', function(e) {
        if (e.target.hasAttribute('data-lang')) {
            e.preventDefault();
            const targetUrl = e.target.getAttribute('href');
            if (targetUrl && targetUrl !== '#' && targetUrl !== 'javascript:void(0)') {
                console.log('Language switcher clicked, navigating to:', targetUrl);
                window.location.href = targetUrl;
            }
        }
    });
});
</script>
