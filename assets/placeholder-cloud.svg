<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#FF9800"/>
  
  <!-- Kubernetes logo inspired design -->
  <circle cx="200" cy="150" r="60" fill="white"/>
  <polygon points="200,110 220,140 200,170 180,140" fill="#326CE5"/>
  <circle cx="200" cy="150" r="15" fill="#326CE5"/>
  
  <!-- Docker containers -->
  <rect x="320" y="100" width="60" height="40" fill="#2496ED" rx="5"/>
  <rect x="320" y="150" width="60" height="40" fill="#2496ED" rx="5"/>
  <rect x="320" y="200" width="60" height="40" fill="#2496ED" rx="5"/>
  
  <!-- Cloud providers -->
  <rect x="450" y="80" width="80" height="50" fill="#FF9900" rx="5"/>
  <text x="490" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">AWS</text>
  
  <rect x="450" y="140" width="80" height="50" fill="#0078D4" rx="5"/>
  <text x="490" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">Azure</text>
  
  <rect x="450" y="200" width="80" height="50" fill="#4285F4" rx="5"/>
  <text x="490" y="230" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="white" font-weight="bold">GCP</text>
  
  <!-- GitOps workflow -->
  <rect x="580" y="120" width="100" height="60" fill="#F05032" rx="5"/>
  <text x="630" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="white" font-weight="bold">GitOps</text>
  
  <!-- Connection arrows -->
  <polygon points="270,150 300,140 300,160" fill="#37474F"/>
  <polygon points="390,150 420,140 420,160" fill="#37474F"/>
  <polygon points="540,150 570,140 570,160" fill="#37474F"/>
  
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white" font-weight="bold">
    Cloud &amp; DevOps Consulting
  </text>
</svg>