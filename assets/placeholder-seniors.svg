<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#2196F3"/>
  
  <!-- Computer screen -->
  <rect x="250" y="100" width="300" height="200" fill="#37474F" rx="10"/>
  <rect x="270" y="120" width="260" height="160" fill="#ECEFF1"/>
  
  <!-- Keyboard -->
  <rect x="280" y="320" width="240" height="40" fill="#607D8B" rx="5"/>
  
  <!-- Mouse -->
  <circle cx="550" cy="340" r="15" fill="#455A64"/>
  
  <!-- Helping hands -->
  <circle cx="150" cy="200" r="40" fill="#FFB74D"/>
  <rect x="130" y="240" width="40" height="80" fill="#FF9800"/>
  
  <circle cx="650" cy="200" r="40" fill="#FFB74D"/>
  <rect x="630" y="240" width="40" height="80" fill="#FF9800"/>
  
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white" font-weight="bold">
    IT Training for Seniors
  </text>
</svg>