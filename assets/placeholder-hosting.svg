<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#9C27B0"/>
  
  <!-- Server racks -->
  <rect x="100" y="80" width="80" height="240" fill="#37474F" rx="5"/>
  <rect x="200" y="80" width="80" height="240" fill="#455A64" rx="5"/>
  <rect x="300" y="80" width="80" height="240" fill="#37474F" rx="5"/>
  
  <!-- Server lights -->
  <circle cx="140" cy="120" r="5" fill="#4CAF50"/>
  <circle cx="140" cy="150" r="5" fill="#4CAF50"/>
  <circle cx="140" cy="180" r="5" fill="#FF5722"/>
  <circle cx="140" cy="210" r="5" fill="#4CAF50"/>
  
  <circle cx="240" cy="120" r="5" fill="#4CAF50"/>
  <circle cx="240" cy="150" r="5" fill="#4CAF50"/>
  <circle cx="240" cy="180" r="5" fill="#4CAF50"/>
  <circle cx="240" cy="210" r="5" fill="#4CAF50"/>
  
  <circle cx="340" cy="120" r="5" fill="#4CAF50"/>
  <circle cx="340" cy="150" r="5" fill="#FF5722"/>
  <circle cx="340" cy="180" r="5" fill="#4CAF50"/>
  <circle cx="340" cy="210" r="5" fill="#4CAF50"/>
  
  <!-- Cloud -->
  <ellipse cx="550" cy="150" rx="80" ry="40" fill="white"/>
  <ellipse cx="520" cy="130" rx="50" ry="25" fill="white"/>
  <ellipse cx="580" cy="130" rx="50" ry="25" fill="white"/>
  
  <!-- Connection lines -->
  <line x1="380" y1="150" x2="470" y2="150" stroke="white" stroke-width="3"/>
  
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="white" font-weight="bold">
    Web Hosting &amp; Services
  </text>
</svg>